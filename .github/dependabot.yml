version: 2
updates:
  # ----------------------------------------------------------
  # GitHub Actions (root) - keep SHAs fresh, merge every change
  # into ONE PR per week to avoid notification spam.
  # starter/ is intentionally NOT tracked: it uses human-readable
  # @v2 tags so downstream users can read/edit it directly.
  # ----------------------------------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'Asia/Shanghai'
    open-pull-requests-limit: 3
    labels: ['dependencies', 'github-actions', 'security']
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    groups:
      # Single PR for all action updates (major / minor / patch).
      # Major upgrades to Actions pinned by SHA are low-risk because
      # we read the diff ourselves before merging.
      all-actions:
        patterns: ['*']
        update-types: ['major', 'minor', 'patch']

  # ----------------------------------------------------------
  # NOTE: this template repository has no application manifests
  # (no package.json / requirements.txt / pom.xml / ...), so the
  # other Dependabot ecosystems are intentionally NOT configured
  # here - they would only generate "manifest not found" noise on
  # the Insights page.
  #
  # The user-facing template lives in `starter/.github/dependabot.yml`
  # and is the file downstream consumers copy into their own repos.
  # ----------------------------------------------------------
